<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Сторінку не знайдено</title>
    <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background-color: #0b1020;
          color: #ffffff;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          text-align: center;
          padding: 20px;
        }

        .error-container {
          max-width: 600px;
          background-color: #151c33;
          padding: 32px;
          border-radius: 16px;
          box-shadow: 0 8px 24px rgb(0 0 0 / 25%);
        }

        h1 {
          margin-bottom: 16px;
          font-size: 48px;
          color: #ffcc00;
        }

        p {
          margin-bottom: 16px;
          line-height: 1.6;
        }

        a {
          display: inline-block;
          margin-top: 12px;
          padding: 12px 20px;
          border-radius: 8px;
          background-color: #0b63ce;
          color: #ffffff;
          text-decoration: none;
          font-weight: 700;
        }

        a:hover {
          background-color: #084c9e;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>404</h1>
    <p>Сторінку не знайдено.</p>
    <p>Можливо, адреса введена неправильно або сторінку було переміщено.</p>
    <p>Поверніться на головну сторінку та спробуйте ще раз.</p>
    <a href="./index.html">На головну</a>
</div>
</body>
</html>
